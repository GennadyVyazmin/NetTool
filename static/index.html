<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>NetTool</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <div>
          <p class="eyebrow">Telegram Mini App</p>
          <h1>NetTool</h1>
          <p class="hero-copy">
            Ping, traceroute, port checks, server geo lookup, and favorite hosts in one panel.
          </p>
        </div>
        <div class="hero-badge" id="userBadge">Guest mode</div>
      </section>

      <section class="card">
        <label class="field-label" for="targetInput">Host or IP</label>
        <div class="target-row">
          <input id="targetInput" type="text" placeholder="example.com or 1.1.1.1" />
          <input id="labelInput" type="text" placeholder="Label for favorites" />
        </div>
        <div class="actions-grid">
          <button data-action="ping">Ping</button>
          <button data-action="traceroute">Traceroute</button>
          <button data-action="geo">Geo</button>
          <button data-action="save-favorite" class="secondary">Save favorite</button>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <p class="eyebrow">Port Check</p>
            <h2>Connectivity</h2>
          </div>
        </div>
        <div class="target-row">
          <input id="portInput" type="number" min="1" max="65535" value="443" />
          <button id="portCheckButton">Check port</button>
        </div>
      </section>

      <section class="grid">
        <section class="card result-card">
          <div class="section-head">
            <div>
              <p class="eyebrow">Results</p>
              <h2>Output</h2>
            </div>
            <span class="status-pill" id="statusPill">Idle</span>
          </div>
          <pre id="resultOutput" class="result-output">Waiting for action...</pre>
        </section>

        <section class="card">
          <div class="section-head">
            <div>
              <p class="eyebrow">Favorites</p>
              <h2>Your servers</h2>
            </div>
            <button id="refreshFavorites" class="secondary compact">Refresh</button>
          </div>
          <div id="favoritesList" class="favorites-list"></div>
        </section>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
